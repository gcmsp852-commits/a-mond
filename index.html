<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>QRツイン リーダー</title>
<meta name="theme-color" content="#121212">
<link rel="icon" type="image/png" sizes="512x512" href="icon.png">
<link rel="manifest" href="manifest.json">
<script src="./jsQR.js"></script>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;margin:0;background:#121212;color:#fff;text-align:center}
h2{margin:14px 0;font-size:1.2rem}.camera{position:relative;max-width:640px;margin:0 auto;background:#000;display:none}
video{width:100%;display:block;object-fit:cover}canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.panel{max-width:640px;margin:0 auto;padding:14px;background:#1e1e1e;border-top:1px solid #333;text-align:left;display:none}
.box{margin-bottom:10px;padding:10px;border-radius:8px;background:#2c2c2c;word-break:break-all}.q1{border-left:5px solid #00E676}.q2{border-left:5px solid #29B6F6}
button{width:100%;max-width:320px;padding:14px;font-size:1.05rem;font-weight:700;border:0;border-radius:8px;cursor:pointer;margin-top:10px;background:#6200EE;color:#fff}
button:disabled{background:#555;color:#aaa;cursor:not-allowed}#startBtn{background:#81C784;color:#111}#backBtn{background:#03DAC6;color:#000;margin-top:30px}
.small{font-size:.82rem;color:#9ecfff;margin:6px 0 0}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;justify-content:center;align-items:center}
.modalCard{background:#1e1e1e;padding:20px;border-radius:8px;width:80%;max-width:400px;border:1px solid #333}
</style>
</head>
<body>
<div id="passwordScreen" class="modal">
  <div class="modalCard">
    <h3 style="color:#03DAC6;margin-top:0">パスワード入力</h3>
    <p style="font-size:.9rem;color:#aaa">暗号化された第2QRを検出しました。復号パスワードを入力してください。</p>
    <input id="appPasswordInput" type="password" placeholder="パスワード" style="width:100%;padding:12px;margin-bottom:14px;border-radius:4px;border:1px solid #555;background:#2c2c2c;color:#fff;box-sizing:border-box;font-size:1rem">
    <button onclick="submitPassword()" style="background:#00E676;color:#000">復号する</button>
    <button onclick="cancelPassword()" style="background:#555">キャンセル</button>
  </div>
</div>

<h2>QRツイン リーダー</h2>
<div id="startScreen" style="padding:20px;margin-top:50px">
  <p style="color:#aaa;font-size:.92rem">QRツイン、または離れた2つのQRコードを読み取ります。</p>
  <button id="startBtn" onclick="startApp()">カメラを起動する</button>
</div>

<div id="cameraContainer" class="camera">
  <video id="video" playsinline autoplay muted></video>
  <canvas id="overlayCanvas"></canvas>
</div>

<div id="statusPanel" class="panel">
  <div id="detectorInfo" style="font-size:.8rem;color:#03DAC6;font-weight:700;margin-bottom:10px">エンジン: 初期化中</div>
  <div id="archInfo" class="small">search: 探索中</div>
  <div class="box q1"><strong>第1QR:</strong> <span id="text1">未検出</span><br><span style="font-size:.85em;color:#ccc">管理16bit: <span id="mg1">--</span></span></div>
  <div class="box q2"><strong>第2QR:</strong> <span id="text2">未検出</span><br><span style="font-size:.85em;color:#ccc">管理16bit: <span id="mg2">--</span></span></div>
</div>

<div id="resultScreen" style="display:none;padding:20px;margin-top:50px">
  <h3 style="color:#00E676;margin-bottom:20px">読み取り完了</h3>
  <div class="box q1" style="text-align:left"><strong>第1QR:</strong><br><span id="finalText1"></span><br><span style="font-size:.9em;color:#ffeb3b">管理16bit: <span id="finalMg1">--</span></span></div>
  <div class="box q2" style="text-align:left"><strong>第2QR:</strong><br><span id="finalText2"></span><br><span style="font-size:.9em;color:#ffeb3b">管理16bit: <span id="finalMg2">--</span></span></div>
  <button id="backBtn" onclick="goBack()">カメラ画面に戻る</button>
</div>

<script>
"use strict";
const video=document.getElementById('video');
const overlayCanvas=document.getElementById('overlayCanvas');
const ctx=overlayCanvas.getContext('2d');
const fullCanvas=document.createElement('canvas');
const fullCtx=fullCanvas.getContext('2d',{willReadFrequently:true});
const searchCanvas=document.createElement('canvas');
const searchCtx=searchCanvas.getContext('2d',{willReadFrequently:true});
const roiCanvas=document.createElement('canvas');
const roiCtx=roiCanvas.getContext('2d',{willReadFrequently:true});

const state={stream:null,running:false,starting:false,rafId:0,mode:'search',detector:null,lastProcessAt:0,searchInterval:130,trackInterval:65,searchScale:960,qr1:null,qr2:null,lastSearchCandidates:[],appPassword:null,appMask:null,lostCount:0,maxLost:6};

const arr=v=>!v?[]:Array.isArray(v)?v:[v];
const txt=(id,v)=>document.getElementById(id).textContent=v;
const cpy=p=>p?{x:p.x,y:p.y}:null;
const center=ps=>{if(!ps?.length)return{x:0,y:0};let x=0,y=0;for(const p of ps){x+=p.x;y+=p.y;}return{x:x/ps.length,y:y/ps.length};};
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
const clamp=(v,min,max)=>Math.max(min,Math.min(max,v));

function mgCodeToBits(code){if(typeof code!=='number'||!Number.isFinite(code))return null;return (code>>>0).toString(2).padStart(16,'0').slice(-16);}
function parseManagement(bitsOrCode){const bits=typeof bitsOrCode==='string'?bitsOrCode:mgCodeToBits(bitsOrCode);if(!bits||bits.length!==16)return{bits:null,qrNo:null,sameData:false,systemEncrypted:false,appEncrypted:false,dataType:null};return{bits,qrNo:bits[0]==='1'?2:1,sameData:bits[5]==='1',systemEncrypted:bits[6]==='1',appEncrypted:bits[7]==='1',dataType:parseInt(bits.slice(8,11),2)};}
function locPoints(loc){if(!loc)return[];if(loc.corners?.length>=4)return loc.corners.map(cpy);const tl=loc.topLeftCorner||loc.topLeft,tr=loc.topRightCorner||loc.topRight,br=loc.bottomRightCorner||loc.bottomRight,bl=loc.bottomLeftCorner||loc.bottomLeft;return[tl,tr,br,bl].filter(Boolean).map(cpy);}
function mapPoints(ps,sx,sy,ox=0,oy=0){return(ps||[]).map(p=>({x:p.x*sx+ox,y:p.y*sy+oy}));}
function bounds(ps,pad=0){if(!ps?.length)return null;const xs=ps.map(p=>p.x),ys=ps.map(p=>p.y);const minX=Math.min(...xs)-pad,maxX=Math.max(...xs)+pad,minY=Math.min(...ys)-pad,maxY=Math.max(...ys)+pad;return{x:minX,y:minY,w:maxX-minX,h:maxY-minY};}
function clampBounds(b,maxW,maxH){const x=clamp(Math.round(b.x),0,Math.max(0,maxW-1)),y=clamp(Math.round(b.y),0,Math.max(0,maxH-1));const w=clamp(Math.round(b.w),1,Math.max(1,maxW-x)),h=clamp(Math.round(b.h),1,Math.max(1,maxH-y));return{x,y,w,h};}
function expandBounds(b,m,maxW,maxH){if(!b)return null;return clampBounds({x:b.x-m,y:b.y-m,w:b.w+m*2,h:b.h+m*2},maxW,maxH);}

function normalizeCandidate(detail,ox=0,oy=0,sx=1,sy=1){if(!detail)return null;const pts=mapPoints(detail.corners||locPoints(detail.location),sx,sy,ox,oy);if(pts.length<4)return null;const raw=detail.rawBytes||detail.rawCodewords||null;const mgBits=detail.managementBits||detail.bitStream?.managementBits||mgCodeToBits(detail.managementCode);return{text:detail.data||detail.text||null,managementCode:detail.managementCode??null,management:parseManagement(mgBits),points:pts,center:center(pts),bounds:bounds(pts,0),version:detail.version||detail.rawData?.version||null,formatInfo:detail.formatInfo||detail.rawData?.formatInfo||null,rawBytes:raw?Uint8Array.from(raw):null,rawData:detail.rawData||(raw&&detail.version&&detail.formatInfo?{codewords:Array.from(raw),version:detail.version,formatInfo:detail.formatInfo}:null),decodeStage:detail.decodeStage||null,score:detail.score||0,isDecrypted:!!detail.isDecrypted};}

function cScore(c){if(!c)return-Infinity;let s=0;if(c.text)s+=1200;if(c.management?.bits)s+=300;if(c.rawBytes)s+=500;if(c.version&&c.formatInfo)s+=80;if(c.points?.length>=4)s+=120;s+=Math.min(180,Math.round(Math.sqrt(Math.max(1,(c.bounds?.w||1)*(c.bounds?.h||1)))));return s+(c.score||0);}
function mergeInfo(a,b){if(!a)return b;if(!b)return a;const p=(b.points?.length||0)>=(a.points?.length||0)?b.points:a.points;const bmg=!!b.management?.bits,amg=!!a.management?.bits;return{...a,...b,text:bmg?(b.text||a.text||null):(a.text||b.text||null),managementCode:bmg?(b.managementCode??a.managementCode??null):(a.managementCode??b.managementCode??null),management:bmg?b.management:(amg?a.management:(b.management||a.management)),rawBytes:b.rawBytes||a.rawBytes||null,rawData:b.rawData||a.rawData||null,version:b.version||a.version||null,formatInfo:b.formatInfo||a.formatInfo||null,points:p,center:center(p||[]),bounds:bounds(p||[],0),decodeStage:b.decodeStage||a.decodeStage||null,score:Math.max(a.score||0,b.score||0),isDecrypted:!!(a.isDecrypted||b.isDecrypted)};}
function mergeCandidates(a,b){const out=a.slice();for(const c of b){const i=out.findIndex(v=>v?.points?.length&&c?.points?.length&&dist(v.center,c.center)<28);if(i<0)out.push(c);else out[i]=mergeInfo(out[i],c);}return out.sort((x,y)=>cScore(y)-cScore(x));}

function decodeFast(img,ox=0,oy=0,sx=1,sy=1){if(!img?.data||typeof jsQR!=='function')return[];try{return arr(jsQR(img.data,img.width,img.height,{inversionAttempts:'dontInvert',multi:true})).map(d=>normalizeCandidate(d,ox,oy,sx,sy)).filter(Boolean).sort((a,b)=>cScore(b)-cScore(a));}catch(e){console.warn('decodeFast',e);return[];}}
function decodeRaw(img,ox=0,oy=0,sx=1,sy=1){if(!img?.data||typeof jsQR!=='function')return[];try{const out=[];for(const cand of arr(jsQR(img.data,img.width,img.height,{inversionAttempts:'dontInvert',multi:true,extractRawOnly:true}))){const raw=cand?.codewords?Array.from(cand.codewords):null;const rawData=raw&&cand?.version&&cand?.formatInfo?{codewords:raw,version:cand.version,formatInfo:cand.formatInfo}:null;const resumed=rawData&&typeof jsQR.resumeDecode==='function'?jsQR.resumeDecode(rawData,null):null;const n=normalizeCandidate({location:cand?.location||null,corners:cand?.corners||null,data:resumed?.text||resumed?.data||null,text:resumed?.text||resumed?.data||null,managementCode:resumed?.managementCode??null,rawCodewords:raw,rawData,version:cand?.version||null,formatInfo:cand?.formatInfo||null,decodeStage:resumed?'raw+resume':'raw',score:resumed?20:0},ox,oy,sx,sy);if(n)out.push(n);}return out.sort((a,b)=>cScore(b)-cScore(a));}catch(e){console.warn('decodeRaw',e);return[];}}

function chooseBestPair(cands){const v=cands.filter(c=>c?.points?.length>=4);if(!v.length)return{first:null,second:null};const ord=v.slice().sort((a,b)=>cScore(b)-cScore(a));const first=ord.find(c=>c.management?.qrNo===1)||ord[0];const others=ord.filter(c=>c!==first&&dist(c.center,first.center)>24);if(!others.length)return{first,second:null};const pScore=c=>{const d=dist(first.center,c.center);let s=cScore(c)+Math.min(600,d);if(d<30)s-=500;const a1=Math.max(1,(first.bounds?.w||1)*(first.bounds?.h||1)),a2=Math.max(1,(c.bounds?.w||1)*(c.bounds?.h||1));if((a1>a2?a1/a2:a2/a1)>7)s-=260;return s;};others.sort((a,b)=>pScore(b)-pScore(a));return{first,second:others[0]||null};}
function excludeNear(cands,qr1,min=40){if(!qr1?.center)return cands.slice();return cands.filter(c=>c?.center&&dist(c.center,qr1.center)>=min);}
function pickEncryptedSecond(cands,qr1){const f=excludeNear(cands,qr1,40).filter(c=>c?.rawBytes&&c?.version&&c?.formatInfo);if(!f.length)return null;f.sort((a,b)=>{const da=qr1?.center&&a.center?dist(qr1.center,a.center):0,db=qr1?.center&&b.center?dist(qr1.center,b.center):0;const sa=1200+Math.min(500,da)+(a.score||0),sb=1200+Math.min(500,db)+(b.score||0);return sb-sa;});return{...f[0],text:null,isDecrypted:false};}

function withRoi(q,m=20){if(!q?.bounds)return q;return{...q,roi:expandBounds(q.bounds,m,fullCanvas.width,fullCanvas.height)};}
function cropRoi(b){if(!b)return null;const c=clampBounds(b,fullCanvas.width,fullCanvas.height);roiCanvas.width=c.w;roiCanvas.height=c.h;roiCtx.clearRect(0,0,c.w,c.h);roiCtx.drawImage(fullCanvas,c.x,c.y,c.w,c.h,0,0,c.w,c.h);return{bounds:c,imageData:roiCtx.getImageData(0,0,c.w,c.h)};}
function drawPoly(ps,col,label){if(!ps||ps.length<4)return;ctx.save();ctx.strokeStyle=col;ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(ps[0].x,ps[0].y);for(let i=1;i<ps.length;i++)ctx.lineTo(ps[i].x,ps[i].y);ctx.closePath();ctx.stroke();ctx.fillStyle=col;ctx.font='bold 18px sans-serif';ctx.fillText(label,ps[0].x+6,ps[0].y-8);ctx.restore();}
function drawRoi(b,col,label){if(!b)return;ctx.save();ctx.strokeStyle=col;ctx.setLineDash([8,6]);ctx.lineWidth=2;ctx.strokeRect(b.x,b.y,b.w,b.h);ctx.setLineDash([]);ctx.fillStyle=col;ctx.font='14px sans-serif';ctx.fillText(label,b.x+6,b.y+18);ctx.restore();}
function overlay(){ctx.clearRect(0,0,overlayCanvas.width,overlayCanvas.height);if(state.qr1?.points)drawPoly(state.qr1.points,'#00E676','QR1');if(state.qr2?.points)drawPoly(state.qr2.points,'#29B6F6','QR2');if(state.qr1?.roi)drawRoi(state.qr1.roi,'rgba(0,230,118,.85)','ROI1');if(state.qr2?.roi)drawRoi(state.qr2.roi,'rgba(41,182,246,.85)','ROI2');}

function fitVideo(){const w=video.videoWidth||0,h=video.videoHeight||0;if(!w||!h)return false;if(overlayCanvas.width!==w||overlayCanvas.height!==h){overlayCanvas.width=w;overlayCanvas.height=h;fullCanvas.width=w;fullCanvas.height=h;}return true;}
function prepSearch(){const fw=fullCanvas.width,fh=fullCanvas.height,scale=Math.min(1,state.searchScale/Math.max(fw,fh));searchCanvas.width=Math.max(1,Math.round(fw*scale));searchCanvas.height=Math.max(1,Math.round(fh*scale));searchCtx.drawImage(fullCanvas,0,0,searchCanvas.width,searchCanvas.height);return{sx:fw/searchCanvas.width,sy:fh/searchCanvas.height};}

async function detectByBarcodeDetector(sx,sy){if(!state.detector)return[];try{const found=await state.detector.detect(searchCanvas);const list=[];for(const item of found){let ps=null;const cp=Array.isArray(item.cornerPoints)?item.cornerPoints:null;if(cp&&cp.length>=4)ps=cp.map(p=>({x:p.x*sx,y:p.y*sy}));else if(item.boundingBox){const b=item.boundingBox;ps=[{x:b.x*sx,y:b.y*sy},{x:(b.x+b.width)*sx,y:b.y*sy},{x:(b.x+b.width)*sx,y:(b.y+b.height)*sy},{x:b.x*sx,y:(b.y+b.height)*sy}];}if(!ps)continue;const b=expandBounds(bounds(ps,0),16,fullCanvas.width,fullCanvas.height);const roi=cropRoi(b);if(!roi)continue;const dec=decodeFast(roi.imageData,roi.bounds.x,roi.bounds.y,1,1);if(dec.length)list.push(dec[0]);}return list;}catch(e){console.warn('detector',e);return[];}}

function askPwNeeded(){return !!(state.qr1?.management?.appEncrypted&&state.qr2?.rawBytes&&!state.qr2?.isDecrypted);}
function ui(){const wait=askPwNeeded();txt('text1',state.qr1?.text||'未検出');txt('text2',wait?'候補あり（未復号）':(state.qr2?.text||(state.qr2?.rawBytes?'候補あり（未復号）':'未検出')));txt('mg1',state.qr1?.management?.bits||'--');txt('mg2',state.qr2?.management?.bits||'--');txt('archInfo',state.mode==='search'?'search: 2QR探索中':state.mode==='track'?'track: ROI追跡中':state.mode==='password'?'password: 第2QRの復号待ち':'paused');}
function done(){if(state.qr1?.management?.appEncrypted&&!state.qr2?.isDecrypted)return false;if(!state.qr1?.text||!state.qr2?.text)return false;txt('finalText1',state.qr1.text);txt('finalText2',state.qr2.text);txt('finalMg1',state.qr1.management?.bits||'--');txt('finalMg2',state.qr2.management?.bits||'--');document.getElementById('resultScreen').style.display='block';document.getElementById('cameraContainer').style.display='none';document.getElementById('statusPanel').style.display='none';state.mode='paused';state.running=false;return true;}

function fullFast(){const img=searchCtx.getImageData(0,0,searchCanvas.width,searchCanvas.height);const sx=fullCanvas.width/searchCanvas.width,sy=fullCanvas.height/searchCanvas.height;return decodeFast(img,0,0,sx,sy);}
function fullRaw(){const img=fullCtx.getImageData(0,0,fullCanvas.width,fullCanvas.height);return decodeRaw(img,0,0,1,1);}
function rawInBounds(b){const roi=cropRoi(b);return roi?decodeRaw(roi.imageData,roi.bounds.x,roi.bounds.y,1,1):[];}
function tryFullRawSecond(qr1){if(!qr1?.management?.appEncrypted)return null;const raw=fullRaw();state.lastSearchCandidates=mergeCandidates(state.lastSearchCandidates||[],raw);return pickEncryptedSecond(raw,qr1);}
function decodeTrack(entry,rawMode=false){if(!entry?.roi)return null;const roi=cropRoi(entry.roi);if(!roi)return null;const d=rawMode?decodeRaw(roi.imageData,roi.bounds.x,roi.bounds.y,1,1):decodeFast(roi.imageData,roi.bounds.x,roi.bounds.y,1,1);return d.length?withRoi(d[0],24):null;}

async function processSearch(){const {sx,sy}=prepSearch();let cands=await detectByBarcodeDetector(sx,sy);if(cands.length<2)cands=mergeCandidates(cands,fullFast());state.lastSearchCandidates=cands;let {first,second}=chooseBestPair(cands);if(first?.management?.appEncrypted){let raw=[];if(second?.bounds)raw=mergeCandidates(raw,rawInBounds(expandBounds(second.bounds,20,fullCanvas.width,fullCanvas.height)));if(!raw.length){const img=searchCtx.getImageData(0,0,searchCanvas.width,searchCanvas.height);raw=mergeCandidates(raw,decodeRaw(img,0,0,sx,sy));}if(!raw.length)raw=mergeCandidates(raw,fullRaw());cands=mergeCandidates(cands,raw);state.lastSearchCandidates=cands;const rs=pickEncryptedSecond(cands,first);if(rs)second=rs;}if(first){state.qr1=withRoi(first,24);state.qr2=second?withRoi(second,24):null;state.lostCount=0;state.mode='track';overlay();ui();if(askPwNeeded()){showPasswordScreen();return;}done();}else{overlay();ui();}}

async function processTrack(){const n1=decodeTrack(state.qr1,false),n2=decodeTrack(state.qr2,false);if(n1)state.qr1=withRoi(mergeInfo(state.qr1,n1),24);if(n2)state.qr2=withRoi(mergeInfo(state.qr2,n2),24);if(state.qr1?.management?.appEncrypted&&(!state.qr2?.rawBytes||!state.qr2?.version||!state.qr2?.formatInfo)){let r2=decodeTrack(state.qr2,true);if(!r2&&state.qr2?.bounds){const near=rawInBounds(expandBounds(state.qr2.bounds,20,fullCanvas.width,fullCanvas.height));r2=near.length?withRoi(near[0],24):null;}if(!r2)r2=tryFullRawSecond(state.qr1);if(r2)state.qr2=withRoi(mergeInfo(state.qr2,r2),24);}if(!n1&&!n2)state.lostCount++;else state.lostCount=0;if(state.lostCount>=state.maxLost){state.mode='search';state.qr1=null;state.qr2=null;overlay();ui();return;}if((!state.qr2||(state.qr1?.management?.appEncrypted&&!state.qr2.rawBytes))&&state.lastSearchCandidates.length>1){const sec=state.qr1?.management?.appEncrypted?pickEncryptedSecond(state.lastSearchCandidates,state.qr1):chooseBestPair(state.lastSearchCandidates).second;if(sec)state.qr2=withRoi(mergeInfo(state.qr2,sec),24);}overlay();ui();if(askPwNeeded()){showPasswordScreen();return;}done();}

async function loop(){if(!state.running)return;state.rafId=requestAnimationFrame(loop);const now=performance.now(),intv=state.mode==='track'?state.trackInterval:state.searchInterval;if(now-state.lastProcessAt<intv)return;state.lastProcessAt=now;if(!fitVideo())return;fullCtx.drawImage(video,0,0,fullCanvas.width,fullCanvas.height);if(state.mode==='password'||state.mode==='paused'){overlay();return;}try{if(state.mode==='search')await processSearch();else await processTrack();}catch(e){console.error(e);txt('archInfo','error: '+String(e?.message||e));state.mode='search';}}

async function createDetector(){if(!('BarcodeDetector'in window)){state.detector=null;txt('detectorInfo','エンジン: jsQR ROI');return;}try{const s=await BarcodeDetector.getSupportedFormats();if(s.includes('qr_code')){state.detector=new BarcodeDetector({formats:['qr_code']});txt('detectorInfo','エンジン: BarcodeDetector + jsQR ROI');return;}}catch(e){console.warn(e);}state.detector=null;txt('detectorInfo','エンジン: jsQR ROI');}

async function startCamera(){if(state.starting)return false;state.starting=true;try{if(state.stream){for(const t of state.stream.getTracks())t.stop();state.stream=null;}const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},audio:false});state.stream=stream;video.srcObject=stream;await new Promise(r=>{if(video.readyState>=1)return r();video.addEventListener('loadedmetadata',r,{once:true});});await video.play().catch(()=>{});return true;}catch(err){alert('カメラを起動できませんでした。\nエラー: '+(err?.message||err));return false;}finally{state.starting=false;}}
function stopCamera(){state.running=false;cancelAnimationFrame(state.rafId);state.rafId=0;try{video.pause();}catch{}if(state.stream){for(const t of state.stream.getTracks())t.stop();state.stream=null;}video.srcObject=null;}

async function sha256(bytes){const b=await crypto.subtle.digest('SHA-256',bytes);return new Uint8Array(b);} 
async function deriveMask(password,needed){const out=new Uint8Array(needed);let filled=0;let h=await sha256(new TextEncoder().encode(String(password??'')));while(filled<needed){const take=Math.min(32,needed-filled);out.set(h.subarray(0,take),filled);filled+=take;if(filled>=needed)break;h=await sha256(h);}return out;}

async function startApp(){const b=document.getElementById('startBtn');b.disabled=true;b.innerText='起動中...';if(typeof jsQR==='undefined'){alert('jsQR.js の読み込みに失敗しました。');b.disabled=false;b.innerText='カメラを起動する';return;}await createDetector();if(!await startCamera()){b.disabled=false;b.innerText='カメラを起動する';return;}document.getElementById('startScreen').style.display='none';document.getElementById('resultScreen').style.display='none';document.getElementById('cameraContainer').style.display='block';document.getElementById('statusPanel').style.display='block';state.mode='search';state.running=true;state.lastProcessAt=0;state.qr1=null;state.qr2=null;state.lastSearchCandidates=[];state.appPassword=null;state.appMask=null;state.lostCount=0;ui();requestAnimationFrame(loop);} 
function showPasswordScreen(){state.mode='password';document.getElementById('appPasswordInput').value='';document.getElementById('passwordScreen').style.display='flex';ui();}
function cancelPassword(){document.getElementById('passwordScreen').style.display='none';state.mode='track';ui();}
async function submitPassword(){const pw=document.getElementById('appPasswordInput').value.trim();if(!pw){alert('パスワードを入力してください。');return;}if(!state.qr2?.rawBytes){alert('第2QRの暗号データがまだ取得できていません。');return;}if(!state.qr2?.version||!state.qr2?.formatInfo){alert('第2QRの復号に必要なメタ情報が不足しています。');state.mode='track';document.getElementById('passwordScreen').style.display='none';ui();return;}if(!crypto?.subtle){alert('このブラウザは復号に必要なWebCryptoに未対応です。');return;}state.appPassword=pw;state.appMask=await deriveMask(state.appPassword,state.qr2.rawBytes.length);const meta={codewords:Array.from(state.qr2.rawBytes),version:state.qr2.version,formatInfo:state.qr2.formatInfo};const dec=typeof jsQR.resumeDecode==='function'?jsQR.resumeDecode(meta,state.appMask):null;const decryptedRaw=Uint8Array.from(state.qr2.rawBytes,(v,i)=>v^state.appMask[i]);const rawMeta={codewords:Array.from(decryptedRaw),version:state.qr2.version,formatInfo:state.qr2.formatInfo};if(dec&&(dec.text||dec.data)){state.qr2=withRoi({...state.qr2,text:dec.text||dec.data,managementCode:dec.managementCode??null,management:parseManagement(dec.managementBits||dec.managementCode),rawBytes:decryptedRaw,rawData:rawMeta,isDecrypted:true},24);document.getElementById('passwordScreen').style.display='none';ui();done();if(state.running)state.mode='track';return;}alert('パスワードが違うか、データが破損しています。');document.getElementById('passwordScreen').style.display='none';state.mode='track';ui();}
function goBack(){document.getElementById('resultScreen').style.display='none';document.getElementById('cameraContainer').style.display='block';document.getElementById('statusPanel').style.display='block';state.mode='search';state.running=true;state.lastProcessAt=0;state.qr1=null;state.qr2=null;state.lastSearchCandidates=[];requestAnimationFrame(loop);} 
window.startApp=startApp;window.submitPassword=submitPassword;window.cancelPassword=cancelPassword;window.goBack=goBack;
</script>
